version: "3.8"

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - APP_ENV=development
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
